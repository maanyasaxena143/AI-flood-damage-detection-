<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Damage Assessment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Flood Monitoring System</h1>

    
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label>Select Mode:</label>
        <select name="mode">
            <option value="user">(Single Image)</option>
            <option value="server">(Multiple Images)</option>
        </select>
        
        <input type="file" name="file" multiple required>
        <button type="submit">Upload</button>
    </form>

    {% if results_data %}
        <h2>Results</h2>
        {% for result in results_data %}
            <div class="result-card">
                <h3>{{ result.image }}</h3>
                <img src="{{ url_for('damage_files', filename=result.image) }}" alt="Uploaded Image">
                <p>Houses: {{ result.houses }}</p>
                <p>Flooded Areas: {{ result.flooded_areas }}</p>
                <p>Severity: <strong>{{ result.severity }}</strong></p>
                <a href="{{ url_for('report_files', filename=result.pdf) }}" class="download-btn" download>Download Report</a>


                
                <h4>Heatmap</h4>
                <img src="{{ url_for('damage_files', filename=result.heatmap) }}" alt="Heatmap Image">
            </div>
        {% endfor %}
    {% endif %}

    
    

    <h2>Interactive Map</h2>
    <iframe src="{{ url_for('map_view') }}" width="100%" height="400"></iframe>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    

</body>
</html>
